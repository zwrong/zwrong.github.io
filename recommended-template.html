<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" type="text/css" href="/style.css" />
<title>{{pageTitle}}</title>
<meta name="description" content="{{pageDescription}}" />
<meta property="og:title" content="{{pageTitle}}" />
<meta property="og:description" content="{{pageDescription}}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://vinen.dev/recommended-reading/" />
<meta property="og:image" content="https://zwrong.github.io/favicon.svg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{pageTitle}}" />
<meta name="twitter:description" content="{{pageDescription}}" />
<meta name="twitter:site" content="@Vinen77" />
<script src="/components.js"></script>
</head>
<body>
  <div class="mx-auto p-6" style="max-width: 640px; width: 100%">
    <div class="flex flex-row pb-4">
      <a href="/" style="color: var(--text-color); text-decoration: none;">
        <div class="flex flex-col">
          <h2>Vinen</h2>
          <span class="text-sm">Agent <span class="thin-dot">·</span> Harness</span>
        </div>
      </a>
      <theme-toggle class="mb-auto ml-auto"></theme-toggle>
    </div>

    <h1 class="recommended-page-title">Recommended Reading / Viewing</h1>
    <p class="text-sm text-muted mb-8">Articles and videos I've read and recommend.</p>

    <div class="recommended-list">
      {{recommendedList}}
    </div>

    <footer class="mt-8 pt-6" style="border-top: 1px solid var(--border-color);">
      <p class="text-sm text-muted">Last updated: {{updatedDate}}</p>
      <p class="text-sm text-muted mt-2">
        <a href="/" style="border-bottom: 1px solid var(--border-color);">&larr; Back to home</a>
      </p>
    </footer>
  </div>
</body>
</html>
