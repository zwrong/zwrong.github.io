<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" type="text/css" href="/style.css" />
<title>{{title}}</title>
<meta name="description" content="{{description}}" />
<meta property="og:title" content="{{title}}" />
<meta property="og:type" content="article" />
<meta property="og:url" content="https://vinen.dev/{{slug}}/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{title}}" />
<script src="/components.js"></script>
</head>
<body>
  <div class="mx-auto p-6" style="max-width: 640px; width: 100%">
    <div class="flex flex-row pb-4">
      <a href="/" style="color: var(--text-color); text-decoration: none;">
        <div class="flex flex-col">
          <h2>Vinen</h2>
          <span class="text-sm">Agent <span class="thin-dot">·</span> Harness</span>
        </div>
      </a>
      <theme-toggle class="mb-auto ml-auto"></theme-toggle>
    </div>

    <article>
      {{content}}
    </article>

    <footer class="mt-8 pt-6" style="border-top: 1px solid var(--border-color);">
      <p class="text-sm text-muted">{{footerLine}}</p>
      <p class="text-sm text-muted mt-2">
        <a href="/" style="border-bottom: 1px solid var(--border-color);">&larr; Back to home</a>
      </p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof hljs !== 'undefined') {
        hljs.highlightAll();
      }
    });
  </script>
</body>
</html>
